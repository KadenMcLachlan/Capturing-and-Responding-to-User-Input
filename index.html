<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Feedback Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-container">
    <h1>User Feedback Form</h1>
    <form id="feedback-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" data-tooltip="Enter your full name" />
        <p class="error" id="name-error"></p>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" data-tooltip="Enter a valid email address" />
        <p class="error" id="email-error"></p>
      </div>
      <div class="form-group">
        <label for="comments">Comments</label>
        <textarea id="comments" data-tooltip="Type your feedback here"></textarea>
        <p id="char-count">Characters: 0</p>
        <p class="error" id="comments-error"></p>
      </div>
      <div id="tooltip"></div>
      <button type="submit">Submit Feedback</button>
    </form>
    <h2>Submitted Feedback</h2>
    <div id="feedback-display"></div>
  </div>
  <script src="cp_1.js"></script>
</body>
</html>
